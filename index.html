<!DOCTYPE html>
<html lang="en" data-theme="light" class="no-js">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE | Digital Collective</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <style>
        .js-loading * {
            animation-play-state: paused !important;
        }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div class="preloader">
        <div class="preloader-inner">
            <div class="preloader-spinner"></div>
        </div>
    </div>

    <!-- Cursor -->
    <div class="custom-cursor cursor-outer"></div>
    <div class="custom-cursor cursor-inner"></div>

    <!-- Navigation -->
    <header class="blend-header">
        <div class="header-container">
            <a href="index.html" class="logo" data-cursor-hover>
                <span>A</span><span>C</span><span>E</span>
            </a>
            
            <nav class="primary-nav">
                <ul>
                    <li><a href="discover.html" data-cursor-hover data-text="Discover">Discover</a></li>
                    <li><a href="activities.html" data-cursor-hover data-text="Activities">Activities</a></li>
                    <li><a href="about.html" data-cursor-hover data-text="About">About</a></li>
                </ul>
            </nav>
            
            <div class="header-right">
                <button class="theme-toggle" data-cursor-hover aria-label="Toggle theme">
                    <span class="theme-icon">
                        <i class="fas fa-moon light-icon"></i>
                        <i class="fas fa-sun dark-icon"></i>
                    </span>
                </button>
                
                <div class="menu-toggle" data-cursor-hover>
                    <span class="menu-line"></span>
                    <span class="menu-line"></span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section class="fullscreen-section hero-section" data-section="hero">
            <div class="hero-content">
                <h1 class="hero-title" data-split-text>
                    <span class="line"><span class="word">We</span></span>
                    <span class="line"><span class="word">Are</span></span>
                    <span class="line"><span class="word">ACE</span></span>
                </h1>
                
                <div class="hero-scroll-indicator">
                    <span class="scroll-text">Scroll</span>
                    <div class="scroll-line"></div>
                </div>
            </div>
            
            <div class="hero-background">
                <div class="hero-image" data-parallax data-speed="0.2"></div>
                <div class="hero-overlay"></div>
            </div>
        </section>

        <!-- Horizontal Scroll Sections -->
        <div class="horizontal-scroll-container">
            <div class="horizontal-scroll-track">
                <!-- Project 1 -->
                <section class="project-section" data-project="1">
                    <div class="project-content">
                        <div class="project-info">
                            <span class="project-number">01</span>
                            <h2 class="project-title">Digital Experience</h2>
                            <p class="project-description">Creating immersive digital environments</p>
                            <a href="#" class="project-link" data-cursor-hover>View Project</a>
                        </div>
                        
                        <div class="project-media">
                            <div class="project-image" data-parallax data-speed="0.1">
                                <img src="assets/images/project-1.jpg" alt="Project 1">
                            </div>
                            <div class="project-video">
                                <video autoplay loop muted playsinline>
                                    <source src="assets/videos/project-1.mp4" type="video/mp4">
                                </video>
                            </div>
                        </div>
                    </div>
                </section>
                
                <!-- Additional project sections... -->
            </div>
        </div>
        
        <!-- More sections... -->
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-grid">
                <!-- Footer content... -->
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="assets/js/vendor/gsap.min.js"></script>
    <script src="assets/js/vendor/ScrollTrigger.min.js"></script>
    <script src="assets/js/vendor/SplitText.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
