<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACE SRKREC | Tech Community</title>
  <link rel="stylesheet" href="styles/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Hero Section -->
  <section class="hero">
    <img src="assets/images/srkr-logo.png" alt="SRKR Logo" class="logo">
    <h1>WELCOME TO <span>ACE</span></h1>
    <p>Bhimavaram's Premier Tech Community Since 2006</p>
    <button class="cta-button">Join Now</button>
  </section>

  <!-- Events Section -->
  <section class="events">
    <h2>OUR FLAGSHIP EVENTS</h2>
    <div class="event-grid">
      <div class="event-card">
        <img src="assets/images/prajwalan-hackathon.jpg" alt="Prajwalan Hackathon">
        <h3>PRAJWALAN 2K25</h3>
        <p>₹50K Prize Pool | Feb 2025</p>
      </div>
      <div class="event-card">
        <img src="assets/images/newbies-freshers.jpg" alt="NEWBIES Event">
        <h3>NEWBIES</h3>
        <p>Freshers' Talent Show | Nov 2024</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>Follow us: <a href="https://instagram.com/srkr_ace" target="_blank">@srkr_ace</a></p>
  </footer>

  <script src="scripts/app.js"></script>
</body>
</html>
