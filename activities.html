<!DOCTYPE html>
<html lang="en" data-theme="light" class="no-js">
<head>
    <!-- Same head as index.html -->
    <title>ACE | Discover</title>
</head>
<body>
    <!-- Same preloader and cursor as index.html -->

    <!-- Navigation (Same as index.html) -->
    <header class="blend-header">
        <!-- Copy header from index.html -->
    </header>

    <main class="discover-page">
        <!-- Hero Section -->
        <section class="discover-hero fullscreen-section">
            <div class="discover-hero-content">
                <h1 class="discover-title" data-split-text>
                    <span class="line"><span class="word">Discover</span></span>
                    <span class="line"><span class="word">Our</span></span>
                    <span class="line"><span class="word">World</span></span>
                </h1>
            </div>
            <div class="discover-hero-bg" data-parallax data-speed="0.3"></div>
        </section>

        <!-- Grid Gallery -->
        <section class="discover-grid">
            <div class="grid-sizer"></div>
            
            <!-- Item 1 -->
            <div class="grid-item" data-category="design" data-animate>
                <div class="grid-item-inner">
                    <div class="grid-image">
                        <img src="assets/images/discover-1.jpg" alt="Discovery 1">
                    </div>
                    <div class="grid-info">
                        <h3>Visual Identity</h3>
                        <p>Branding Design</p>
                        <span class="grid-year">2023</span>
                    </div>
                </div>
            </div>
            
            <!-- Item 2 -->
            <div class="grid-item" data-category="motion" data-animate>
                <!-- Same structure as above -->
            </div>
            
            <!-- 10+ more grid items -->
        </section>

        <!-- Pagination -->
        <div class="discover-pagination">
            <a href="#" class="pagination-prev" data-cursor-hover>
                <span>Previous</span>
            </a>
            <div class="pagination-numbers">
                <a href="#" class="active">1</a>
                <a href="#">2</a>
                <a href="#">3</a>
            </div>
            <a href="#" class="pagination-next" data-cursor-hover>
                <span>Next</span>
            </a>
        </div>
    </main>

    <!-- Same footer as index.html -->

    <!-- Additional JS for filtering -->
    <script>
        // Isotope filtering
        const grid = document.querySelector('.discover-grid');
        const iso = new Isotope(grid, {
            itemSelector: '.grid-item',
            masonry: {
                columnWidth: '.grid-sizer',
                gutter: 30
            }
        });

        // Filter buttons would be added here
    </script>
</body>
</html>
